<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Rekening Bank</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #2c3e50; }
        .saldo-box { font-size: 1.5rem; font-weight: bold; color: #27ae60; margin: 20px 0; padding: 10px; background: #e8f6ed; border-radius: 8px; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; transition: 0.3s; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="card">
    <h2>Bank Selvi</h2>
    <p>Nomor Rekening: 123-456-789</p>
    <div class="saldo-box" id="displaySaldo">Rp 500.000</div>
    
    <button onclick="deposit()">Tambah Saldo (Setor)</button>
    <button onclick="tarik()">Tarik Uang</button>
</div>

<script>
    // Ini adalah logika "Class" yang kamu buat tadi, dikonversi ke JavaScript
    let saldo = 500000;

    function updateTampilan() {
        document.getElementById('displaySaldo').innerText = "Rp " + saldo.toLocaleString('id-ID');
    }

    function deposit() {
        let jumlah = prompt("Masukkan jumlah setor:");
        if (jumlah > 0) {
            saldo += parseInt(jumlah);
            alert("Berhasil setor: Rp " + jumlah);
            updateTampilan();
        }
    }

    function tarik() {
        let jumlah = prompt("Masukkan jumlah tarik:");
        if (jumlah > saldo) {
            alert("Saldo tidak cukup!");
        } else if (jumlah > 0) {
            saldo -= parseInt(jumlah);
            alert("Berhasil tarik: Rp " + jumlah);
            updateTampilan();
        }
    }
</script>

</body>
</html>
